services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: expenses
      POSTGRES_USER: expenses_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_DEV}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expenses_user -d expenses"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  backend_dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    user: "1000:1000"
    secrets:
      - creditcard_backend_dev_postgres_password
      - creditcard_backend_dev_llm_api_key
      - creditcard_backend_dev_investments_llm_api_key
      - creditcard_backend_dev_messages_bot_llm_api_key
      - creditcard_backend_dev_telegram_bot_token
      - creditcard_backend_dev_google_client_id
      - creditcard_backend_dev_google_client_secret
      - creditcard_backend_dev_secret_key
      - creditcard_backend_dev_email_api_key
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql://expenses_user:${POSTGRES_PASSWORD_DEV}@db:5432/expenses
      REDIS_URL: redis://redis:6379/1
      PYTHONUNBUFFERED: "1"
      SMTP_FROM: ${SMTP_FROM:-NikoFin}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-noreply@resend.dev}
    volumes:
      - ./backend/app:/app/app:z
      - ./backend/main.py:/app/main.py:z
      - ./backend/scripts:/app/scripts:z
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  frontend_dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    secrets:
      - creditcard_frontend_dev_google_client_id
    volumes:
      - ./frontend/src:/app/src:Z
      - ./frontend/index.html:/app/index.html:Z
    ports:
      - "8082:5173"
    environment:
      VITE_API_URL: http://localhost:8001
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  celery_worker_dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    user: "1000:1000"
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    secrets:
      - creditcard_backend_dev_postgres_password
      - creditcard_backend_dev_llm_api_key
      - creditcard_backend_dev_investments_llm_api_key
      - creditcard_backend_dev_messages_bot_llm_api_key
      - creditcard_backend_dev_telegram_bot_token
      - creditcard_backend_dev_google_client_id
      - creditcard_backend_dev_google_client_secret
      - creditcard_backend_dev_secret_key
      - creditcard_backend_dev_email_api_key
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql://expenses_user:${POSTGRES_PASSWORD_DEV}@db:5432/expenses
      REDIS_URL: redis://redis:6379/1
      PYTHONUNBUFFERED: "1"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@nikofin.com}
      SMTP_FROM: ${SMTP_FROM:-NikoFin}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-noreply@resend.dev}
    volumes:
      - ./backend/app:/app/app:z
      - ./backend/main.py:/app/main.py:z
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  celery_beat_dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    user: "1000:1000"
    command: celery -A app.celery_app beat --loglevel=info
    secrets:
      - creditcard_backend_dev_postgres_password
      - creditcard_backend_dev_llm_api_key
      - creditcard_backend_dev_investments_llm_api_key
      - creditcard_backend_dev_messages_bot_llm_api_key
      - creditcard_backend_dev_telegram_bot_token
      - creditcard_backend_dev_google_client_id
      - creditcard_backend_dev_google_client_secret
      - creditcard_backend_dev_secret_key
      - creditcard_backend_dev_email_api_key
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql://expenses_user:${POSTGRES_PASSWORD_DEV}@db:5432/expenses
      REDIS_URL: redis://redis:6379/1
      PYTHONUNBUFFERED: "1"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@nikofin.com}
      SMTP_FROM: ${SMTP_FROM:-NikoFin}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-noreply@resend.dev}
    volumes:
      - ./backend/app:/app/app:z
      - ./backend/main.py:/app/main.py:z
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

secrets:
  creditcard_backend_dev_postgres_password:
    external: true
    env: POSTGRES_PASSWORD_DEV
  creditcard_backend_dev_llm_api_key:
    external: true
    env: LLM_API_KEY_DEV
  creditcard_backend_dev_investments_llm_api_key:
    external: true
    env: INVESTMENTS_LLM_API_KEY_DEV
  creditcard_backend_dev_messages_bot_llm_api_key:
    external: true
    env: MESSAGES_BOT_LLM_API_KEY_DEV
  creditcard_backend_dev_telegram_bot_token:
    external: true
    env: TELEGRAM_BOT_TOKEN_DEV
  creditcard_backend_dev_google_client_id:
    external: true
    env: GOOGLE_CLIENT_ID_DEV
  creditcard_backend_dev_google_client_secret:
    external: true
    env: GOOGLE_CLIENT_SECRET_DEV
  creditcard_backend_dev_secret_key:
    external: true
    env: SECRET_KEY_DEV
  creditcard_backend_dev_email_api_key:
    external: true
    env: EMAIL_API_KEY_DEV
  creditcard_frontend_dev_google_client_id:
    external: true
    env: GOOGLE_CLIENT_ID_DEV

volumes:
  postgres_data:
  redis_data:
