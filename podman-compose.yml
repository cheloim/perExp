services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: expenses
      POSTGRES_USER: expenses_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expenses_user -d expenses"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    secrets:
      - creditcard_backend_llm_api_key
      - creditcard_backend_investments_llm_api_key
      - creditcard_backend_telegram_bot_token
      - creditcard_backend_google_client_id
      - creditcard_backend_google_client_secret
      - creditcard_backend_secret_key
    environment:
      DATABASE_URL: postgresql://expenses_user:${POSTGRES_PASSWORD}@db:5432/expenses
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    restart: unless-stopped

  celery_worker:
    build: ./backend
    depends_on:
      - db
      - redis
    secrets:
      - creditcard_backend_llm_api_key
      - creditcard_backend_investments_llm_api_key
      - creditcard_backend_telegram_bot_token
      - creditcard_backend_google_client_id
      - creditcard_backend_google_client_secret
      - creditcard_backend_secret_key
    environment:
      DATABASE_URL: postgresql://expenses_user:${POSTGRES_PASSWORD}@db:5432/expenses
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    secrets:
      - creditcard_frontend_google_client_id
    ports:
      - "8083:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

secrets:
  creditcard_backend_llm_api_key:
    external: true
    env: LLM_API_KEY
  creditcard_backend_investments_llm_api_key:
    external: true
    env: INVESTMENTS_LLM_API_KEY
  creditcard_backend_telegram_bot_token:
    external: true
    env: TELEGRAM_BOT_TOKEN
  creditcard_backend_google_client_id:
    external: true
    env: GOOGLE_CLIENT_ID
  creditcard_backend_google_client_secret:
    external: true
    env: GOOGLE_CLIENT_SECRET
  creditcard_backend_secret_key:
    external: true
    env: SECRET_KEY
  creditcard_frontend_google_client_id:
    external: true
    env: VITE_GOOGLE_CLIENT_ID