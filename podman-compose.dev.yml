services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql://expenses_user:${POSTGRES_PASSWORD}@db:5432/expenses
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/.env:/app/.env:ro
      - ./frontend/src:/app/src:Z
      - ./frontend/index.html:/app/index.html:Z
    ports:
      - "8082:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_GOOGLE_CLIENT_ID: 54424907455-9q3vr4snkchrpqltnsm8a24j8qmj2i27.apps.googleusercontent.com

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql://expenses_user:${POSTGRES_PASSWORD}@db:5432/expenses
      REDIS_URL: redis://redis:6379/0