services:
  backend_dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    secrets:
      - creditcard_backend_dev_postgres_password
      - creditcard_backend_dev_llm_api_key
      - creditcard_backend_dev_investments_llm_api_key
      - creditcard_backend_dev_telegram_bot_token
      - creditcard_backend_dev_google_client_id
      - creditcard_backend_dev_google_client_secret
      - creditcard_backend_dev_secret_key
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql://expenses_dev_user:${POSTGRES_PASSWORD_DEV}@db:5432/expenses_dev
      REDIS_URL: redis://redis:6379/1
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend_dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    secrets:
      - creditcard_frontend_dev_google_client_id
    volumes:
      - ./frontend/src:/app/src:Z
      - ./frontend/index.html:/app/index.html:Z
    ports:
      - "8082:5173"
    environment:
      VITE_API_URL: http://localhost:8001

  celery_worker_dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: celery -A app.celery_app worker --loglevel=info
    secrets:
      - creditcard_backend_dev_postgres_password
      - creditcard_backend_dev_llm_api_key
      - creditcard_backend_dev_investments_llm_api_key
      - creditcard_backend_dev_telegram_bot_token
      - creditcard_backend_dev_google_client_id
      - creditcard_backend_dev_google_client_secret
      - creditcard_backend_dev_secret_key
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql://expenses_dev_user:${POSTGRES_PASSWORD_DEV}@db:5432/expenses_dev
      REDIS_URL: redis://redis:6379/1

secrets:
  creditcard_backend_dev_postgres_password:
    external: true
    env: POSTGRES_PASSWORD_DEV
  creditcard_backend_dev_llm_api_key:
    external: true
    env: LLM_API_KEY_DEV
  creditcard_backend_dev_investments_llm_api_key:
    external: true
    env: INVESTMENTS_LLM_API_KEY_DEV
  creditcard_backend_dev_telegram_bot_token:
    external: true
    env: TELEGRAM_BOT_TOKEN_DEV
  creditcard_backend_dev_google_client_id:
    external: true
    env: GOOGLE_CLIENT_ID_DEV
  creditcard_backend_dev_google_client_secret:
    external: true
    env: GOOGLE_CLIENT_SECRET_DEV
  creditcard_backend_dev_secret_key:
    external: true
    env: SECRET_KEY_DEV
  creditcard_frontend_dev_google_client_id:
    external: true
    env: VITE_GOOGLE_CLIENT_ID_DEV