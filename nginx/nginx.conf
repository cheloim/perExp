# HTTP → HTTPS redirect (all domains)
server {
    listen 80 default_server;
    server_name _;
    return 301 https://${OIKONOMIA_DOMAIN}$request_uri;
}

# www → apex redirect
server {
    listen 443 ssl http2;
    server_name www.${OIKONOMIA_DOMAIN};

    ssl_certificate /etc/letsencrypt/live/${OIKONOMIA_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${OIKONOMIA_DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://${OIKONOMIA_DOMAIN}$request_uri;
}

# Landing site: oikonomia.ar
server {
    listen 443 ssl http2 default_server;
    server_name ${OIKONOMIA_DOMAIN};

    ssl_certificate /etc/letsencrypt/live/${OIKONOMIA_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${OIKONOMIA_DOMAIN}/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# App: platform.oikonomia.ar
server {
    listen 443 ssl http2;
    server_name ${PLATFORM_DOMAIN};

    ssl_certificate /etc/letsencrypt/live/${PLATFORM_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${PLATFORM_DOMAIN}/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; connect-src 'self' https:; frame-ancestors 'none'";

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
        chunked_transfer_encoding on;
    }
}
