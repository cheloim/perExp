name: Deploy to Linode

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/perexp/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/perexp/frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  setup-server:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Install dependencies on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LINODE_SERVER_IP }}
          username: ${{ secrets.LINODE_SSH_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          port: 43422
          script: |
            # Install podman if not exists
            if ! command -v podman &> /dev/null; then
                sudo dnf install -y podman podman-docker
                sudo systemctl enable --now podman.socket
            fi

            # Install podman-compose if not exists
            if ! command -v podman-compose &> /dev/null; then
                sudo dnf install -y python3-pip
                pip3 install --user podman-compose
            fi

            # Create app directory
            sudo mkdir -p /opt/creditcardanalyzer
            sudo chown -R $USER:$USER /opt/creditcardanalyzer

  deploy:
    runs-on: ubuntu-latest
    needs: setup-server

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LINODE_SERVER_IP }}
          username: ${{ secrets.LINODE_SSH_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          port: 43422
          script: |
            # Set image variables
            BACKEND_IMAGE="${{ env.BACKEND_IMAGE }}"
            FRONTEND_IMAGE="${{ env.FRONTEND_IMAGE }}"
            IMAGE_TAG="${{ github.sha }}"

            # Write docker-compose.yml
            cat > /opt/creditcardanalyzer/docker-compose.yml << 'EOF'
            services:
              db:
                image: docker.io/library/postgres:16-alpine
                ports:
                  - "5432:5432"
                environment:
                  POSTGRES_DB: expenses
                  POSTGRES_USER: expenses_user
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U expenses_user -d expenses"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

              redis:
                image: docker.io/library/redis:7-alpine
                volumes:
                  - redis_data:/data
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

              backend:
                image: ${BACKEND_IMAGE}:${IMAGE_TAG}
                depends_on:
                  db:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                healthcheck:
                  test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
                  interval: 5s
                  timeout: 3s
                  retries: 10
                  start_period: 15s
                environment:
                  DATABASE_URL: postgresql://expenses_user:${POSTGRES_PASSWORD}@db:5432/expenses
                  REDIS_URL: redis://redis:6379/0
                  PYTHONUNBUFFERED: "1"
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                  LLM_API_KEY: ${LLM_API_KEY}
                  INVESTMENTS_LLM_API_KEY: ${INVESTMENTS_LLM_API_KEY}
                  MESSAGES_BOT_LLM_API_KEY: ${MESSAGES_BOT_LLM_API_KEY}
                  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
                  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
                  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
                  SECRET_KEY: ${SECRET_KEY}
                  RESEND_API_KEY: ${RESEND_API_KEY}
                  FRONTEND_URL: https://expensas.chelo.ar
                restart: unless-stopped

              celery_worker:
                image: ${BACKEND_IMAGE}:${IMAGE_TAG}
                command: celery -A app.celery_app worker --loglevel=info
                depends_on:
                  - db
                  - redis
                environment:
                  DATABASE_URL: postgresql://expenses_user:${POSTGRES_PASSWORD}@db:5432/expenses
                  REDIS_URL: redis://redis:6379/0
                  PYTHONUNBUFFERED: "1"
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                  LLM_API_KEY: ${LLM_API_KEY}
                  INVESTMENTS_LLM_API_KEY: ${INVESTMENTS_LLM_API_KEY}
                  MESSAGES_BOT_LLM_API_KEY: ${MESSAGES_BOT_LLM_API_KEY}
                  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
                  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
                  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
                  SECRET_KEY: ${SECRET_KEY}
                deploy:
                  resources:
                    limits:
                      memory: 512M
                      cpus: "1.0"
                restart: unless-stopped

              frontend:
                image: ${FRONTEND_IMAGE}:${IMAGE_TAG}
                ports:
                  - "8080:80"
                depends_on:
                  backend:
                    condition: service_healthy
                restart: unless-stopped

            volumes:
              postgres_data:
              redis_data:
            EOF

            # Write image variables to .env
            echo "BACKEND_IMAGE=${BACKEND_IMAGE}" > /opt/creditcardanalyzer/.env
            echo "FRONTEND_IMAGE=${FRONTEND_IMAGE}" >> /opt/creditcardanalyzer/.env
            echo "IMAGE_TAG=${IMAGE_TAG}" >> /opt/creditcardanalyzer/.env

            # Decode base64 secrets and append to .env
            echo '${{ secrets.APP_SECRETS_B64 }}' | base64 -d | python3 -c "
            import json, sys
            data = json.load(sys.stdin)
            for k, v in data.items():
                print(f'{k}={v}')
            " >> /opt/creditcardanalyzer/.env

            # Secure .env
            chmod 600 /opt/creditcardanalyzer/.env

            # Deploy
            cd /opt/creditcardanalyzer
            export PATH="$HOME/.local/bin:$PATH"
            set -a
            source .env
            set +a
            podman-compose pull

            # Run database migration before starting new containers
            echo "Running database migrations..."
            podman-compose run --rm --no-deps backend python -m scripts.migrate_add_reset_token || echo "Migration skipped or failed (non-fatal)"
            podman-compose run --rm --no-deps backend python -m scripts.migrate_remove_haberes || echo "Haberes cleanup skipped or failed (non-fatal)"

            # Clean shutdown of old containers before starting new ones
            echo "Stopping old containers..."
            podman-compose down --remove-orphans 2>/dev/null || true

            echo "Starting new containers..."
            podman-compose up -d --remove-orphans

            # Verify deployment
            echo "Waiting for services to start..."
            sleep 5
            curl -sf http://localhost:8080/api/health && echo "Deploy OK" || echo "WARN: health check failed"
