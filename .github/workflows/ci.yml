name: CI

on:
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: |
          npx prettier --write src/
          git diff --exit-code src/ || (echo "::error::Run 'npx prettier --write src/' locally" && exit 1)

      - name: TypeScript
        run: npm run typecheck

  backend:
    name: Backend Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install ruff mypy

      - name: Ruff Lint
        run: ruff check app/

      - name: Ruff Format
        run: |
          ruff format app/
          git diff --exit-code app/ || (echo "::error::Run 'ruff format app/' locally" && exit 1)

      - name: MyPy
        run: mypy app/
        continue-on-error: true
